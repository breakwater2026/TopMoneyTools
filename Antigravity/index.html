<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopMoneyTools Prototype</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1a252f;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .results {
            margin-top: 25px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
        }
        .status-box {
            padding: 12px;
            margin-top: 10px;
            border-radius: 4px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        .green { background-color: #d4edda; color: #155724; border-left: 5px solid #28a745; }
        .yellow { background-color: #fff3cd; color: #856404; border-left: 5px solid #ffc107; }
        .red { background-color: #f8d7da; color: #721c24; border-left: 5px solid #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h1>TopMoneyTools.com Core Engines</h1>
    
    <div class="grid">
        <!-- TOOL 1: SHOCK RESISTANCE ENGINE -->
        <div class="card">
            <h2>1. Breathing Room & Shock Resistance</h2>
            <div class="input-group">
                <label>Monthly Net Income ($)</label>
                <input type="number" id="t1_income" value="3500" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label>Hard Fixed Expenses ($)</label>
                <input type="number" id="t1_fixed" value="2800" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label>Current Cash Reserves ($)</label>
                <input type="number" id="t1_buffer" value="400" oninput="calculateAll()">
            </div>
            
            <div class="results">
                <h3>Outputs</h3>
                <div>Daily Breathing Room: <strong id="out_dbr">$0.00</strong> / day</div>
                <div id="status_dbr" class="status-box"></div>
                
                <div style="margin-top:15px;">After $500 Emergency Repair: <strong id="out_shock">$0.00</strong></div>
                <div id="status_shock" class="status-box"></div>
            </div>
        </div>

        <!-- TOOL 2: SLOW-BLEED MULTIPLIER SIMULATOR -->
        <div class="card">
            <h2>2. Slow-Bleed Multiplier Simulator</h2>
            <div class="input-group">
                <label>Monthly Net Income ($)</label>
                <input type="number" id="t2_income" value="3500" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label>Survival Housing & Utilities ($)</label>
                <input type="number" id="t2_housing" value="1800" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label>Total Hard Fixed Expenses ($)</label>
                <input type="number" id="t2_fixed" value="2800" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label>Credit Card Minimums (Monthly) ($)</label>
                <input type="number" id="t2_cc" value="150" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label>Active Monthly BNPL Commitments ($)</label>
                <input type="number" id="t2_bnpl" value="200" oninput="calculateAll()">
            </div>
            <div class="input-group">
                <label>Proposed Milestone Cost (e.g. Car Loan) ($)</label>
                <input type="number" id="t2_milestone" value="350" oninput="calculateAll()">
            </div>
            
            <div class="results">
                <h3>Outputs</h3>
                <div>Debt Gravity Index: <strong id="out_dgi">0.00%</strong></div>
                <div id="status_dgi" class="status-box"></div>
                
                <div style="margin-top:15px;">Projected Daily Room Post-Milestone: <strong id="out_mim">$0.00</strong> / day</div>
                <div id="status_mim" class="status-box"></div>
            </div>
        </div>
    </div>
</div>

<script>
function calculateAll() {
    // --- TOOL 1 LOGIC ---
    const t1_income = parseFloat(document.getElementById('t1_income').value) || 0;
    const t1_fixed = parseFloat(document.getElementById('t1_fixed').value) || 0;
    const t1_buffer = parseFloat(document.getElementById('t1_buffer').value) || 0;

    const dbr = (t1_income - t1_fixed) / 30;
    const shock_cash = t1_buffer - 500;

    document.getElementById('out_dbr').innerText = '$' + dbr.toFixed(2);
    document.getElementById('out_shock').innerText = '$' + shock_cash.toFixed(2);

    // DBR Traffic Light
    const statusDbr = document.getElementById('status_dbr');
    if (dbr >= 30) {
        statusDbr.className = "status-box green";
        statusDbr.innerText = "🟢 GREEN: Stable. You can comfortably absorb basic daily lifestyle costs.";
    } else if (dbr >= 10) {
        statusDbr.className = "status-box yellow";
        statusDbr.innerText = "🟡 YELLOW: Vulnerable. Daily cash flow is thin. Minimize non-essential spending.";
    } else {
        statusDbr.className = "status-box red";
        statusDbr.innerText = "🔴 RED: Crisis. Your budget lacks survival breathing room. High risk of accumulating debt.";
    }

    // Emergency Buffer Traffic Light
    const statusShock = document.getElementById('status_shock');
    if (t1_buffer >= 1000) {
        statusShock.className = "status-box green";
        statusShock.innerText = "🟢 GREEN: Stable. You can absorb an emergency and keep a defensive reserve.";
    } else if (t1_buffer >= 500) {
        statusShock.className = "status-box yellow";
        statusShock.innerText = "🟡 YELLOW: Vulnerable. You can pay cash today, but it completely liquidates your net.";
    } else {
        statusShock.className = "status-box red";
        statusShock.innerText = "🔴 RED: Crisis. Immediate debt exposure. A $500 emergency forces high-interest credit reliance.";
    }

    // --- TOOL 2 LOGIC ---
    const t2_income = parseFloat(document.getElementById('t2_income').value) || 0;
    const t2_housing = parseFloat(document.getElementById('t2_housing').value) || 0;
    const t2_fixed = parseFloat(document.getElementById('t2_fixed').value) || 0;
    const t2_cc = parseFloat(document.getElementById('t2_cc').value) || 0;
    const t2_bnpl = parseFloat(document.getElementById('t2_bnpl').value) || 0;
    const t2_milestone = parseFloat(document.getElementById('t2_milestone').value) || 0;

    let dgi = 0;
    if ((t2_income - t2_housing) > 0) {
        dgi = ((t2_cc + t2_bnpl) / (t2_income - t2_housing)) * 100;
    } else if ((t2_cc + t2_bnpl) > 0) {
        dgi = 100; // Cap at max gravity if housing consumes all income
    }
    
    const projected_dbr = (t2_income - t2_fixed - t2_milestone) / 30;

    document.getElementById('out_dgi').innerText = dgi.toFixed(2) + '%';
    document.getElementById('out_mim').innerText = '$' + projected_dbr.toFixed(2);

    // Debt Gravity Traffic Light
    const statusDgi = document.getElementById('status_dgi');
    if (dgi < 15) {
        statusDgi.className = "status-box green";
        statusDgi.innerText = "🟢 GREEN: Stable. Past debts are not severely choking your financial mobility.";
    } else if (dgi < 40) {
        statusDgi.className = "status-box yellow";
        statusDgi.innerText = "🟡 YELLOW: Vulnerable. Rolling debt and installment payments are placing a real drag on your options.";
    } else {
        statusDgi.className = "status-box red";
        statusDgi.innerText = "🔴 RED: Crisis. Your capital is suffocating. Over 40% of wiggle room goes straight to past bills.";
    }

    // Milestone Verdict Traffic Light
    const statusMim = document.getElementById('status_mim');
    if (projected_dbr >= 25) {
        statusMim.className = "status-box green";
        statusMim.innerText = "🟢 GREEN: Milestone Approved. Your structural budget is healthy enough to support this choice.";
    } else if (projected_dbr >= 10) {
        statusMim.className = "status-box yellow";
        statusMim.innerText = "🟡 YELLOW: High-Risk milestone. Committing to this will permanently lock you into a tight budget.";
    } else {
        statusMim.className = "status-box red";
        statusMim.innerText = "🔴 RED: Milestone Denied. This monthly commitment will completely collapse your daily breathing room.";
    }
}

// Initial Run on Page Load
calculateAll();
</script>
</body>
</html>
