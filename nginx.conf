# Canonical-host redirect: www -> apex (301).
# DNS is gray-cloud at Cloudflare, so no Cloudflare rule ever sees this
# traffic — the redirect must happen here, at the origin. The Cloud Run
# domain mapping for www terminates TLS, then nginx issues the 301.
# $request_uri preserves path + query string.
server {
    listen 8080;
    server_name www.topmoneytools.com;
    return 301 https://topmoneytools.com$request_uri;
}

server {
    listen 8080 default_server;
    server_name localhost;

    # Issue RELATIVE redirects only. Behind the Cloudflare tunnel, requests
    # arrive with the internal Cloud Run Host (my-website-service-...a.run.app);
    # nginx's default absolute redirects would leak that origin URL (and the
    # internal :8080 port) into the Location header.
    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;

    # Security headers. NOTE: nginx add_header is not inherited by location
    # blocks that set their own headers, so these are repeated in the three
    # header-bearing locations below (/index.html, /assets/, /sw.js).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Normalize trailing slashes site-wide: /tools/ -> /tools (301).
    # Runs before location matching; root / and file URLs are unaffected.
    # Consolidates duplicate-content URLs for crawlers.
    rewrite ^(.+)/+$ $1 permanent;

    # 301 redirects for legacy legal URLs — server-side, so crawlers
    # consolidate ranking signals to the canonical URL instead of seeing
    # duplicate content served as HTTP 200 by the SPA catch-all below.
    location = /private-policy  { return 301 /privacy; }
    location = /private-policy/ { return 301 /privacy; }
    location = /privacy-policy  { return 301 /privacy; }
    location = /privacy-policy/ { return 301 /privacy; }
    location = /terms-of-service { return 301 /terms; }
    location = /terms-of-service/ { return 301 /terms; }

    # Duplicate education slug — canonical is the short form used by internal
    # links, breadcrumbs, and the page's own canonical tag.
    location = /education/budgeting-for-beginners-50-30-20-rule-explained { return 301 /education/budgeting-for-beginners; }

    # SPA fallback — serve index.html for any non-file route.
    # Avoid $uri/ because real directories (e.g. /tools/) trigger 403.
    location / {
        index index.html;
        try_files $uri /index.html;
    }

    # index.html is not content-hashed — browsers must always revalidate
    # so new deploys are picked up immediately without manual cache purges
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # Assets use content-hashed filenames (Vite) — cache forever.
    # A new deploy produces new filenames, so old cached assets are harmless.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        expires 1y;
        access_log off;
    }

    # Safely handle the webmanifest content-type for Edge PWA support
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Force correct JavaScript content-type and prevent caching for the service worker
    # SW must never be cached — it's the PWA update mechanism
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        default_type application/javascript;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
