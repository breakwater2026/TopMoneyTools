server {
    listen 8080;
    server_name localhost;

    # Issue RELATIVE redirects only. Behind the Cloudflare tunnel, requests
    # arrive with the internal Cloud Run Host (my-website-service-...a.run.app);
    # nginx's default absolute redirects would leak that origin URL (and the
    # internal :8080 port) into the Location header.
    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;

    # Normalize trailing slashes site-wide: /tools/ -> /tools (301).
    # Runs before location matching; root / and file URLs are unaffected.
    # Consolidates duplicate-content URLs for crawlers.
    rewrite ^(.+)/+$ $1 permanent;

    # 301 redirects for legacy legal URLs — server-side, so crawlers
    # consolidate ranking signals to the canonical URL instead of seeing
    # duplicate content served as HTTP 200 by the SPA catch-all below.
    location = /private-policy  { return 301 /privacy; }
    location = /private-policy/ { return 301 /privacy; }
    location = /privacy-policy  { return 301 /privacy; }
    location = /privacy-policy/ { return 301 /privacy; }
    location = /terms-of-service { return 301 /terms; }
    location = /terms-of-service/ { return 301 /terms; }

    # SPA fallback — serve index.html for any non-file route.
    # Avoid $uri/ because real directories (e.g. /tools/) trigger 403.
    location / {
        index index.html;
        try_files $uri /index.html;
    }

    # index.html is not content-hashed — browsers must always revalidate
    # so new deploys are picked up immediately without manual cache purges
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Assets use content-hashed filenames (Vite) — cache forever.
    # A new deploy produces new filenames, so old cached assets are harmless.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # Safely handle the webmanifest content-type for Edge PWA support
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Force correct JavaScript content-type and prevent caching for the service worker
    # SW must never be cached — it's the PWA update mechanism
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        default_type application/javascript;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
