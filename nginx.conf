server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;

    # SPA fallback — serve index.html for any non-file route.
    # Avoid $uri/ because real directories (e.g. /tools/) trigger 403.
    location / {
        index index.html;
        try_files $uri /index.html;
    }

    # Safely handle the webmanifest content-type for Edge PWA support
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Force correct JavaScript content-type and prevent caching for the service worker
    # SW must never be cached — it's the PWA update mechanism
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        default_type application/javascript;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
